name: Ocean View Resort CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download dependencies
        run: |
          mkdir -p lib
          # Download servlet-api
          curl -L -o lib/servlet-api.jar \
            https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/4.0.1/javax.servlet-api-4.0.1.jar
          # Download MySQL connector
          curl -L -o lib/mysql-connector-j-8.3.0.jar \
            https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.3.0/mysql-connector-j-8.3.0.jar
          # Download JavaMail API
          curl -L -o lib/javax.mail-1.6.2.jar \
            https://repo1.maven.org/maven2/com/sun/mail/javax.mail/1.6.2/javax.mail-1.6.2.jar
          # Download Activation Framework
          curl -L -o lib/activation-1.1.1.jar \
            https://repo1.maven.org/maven2/javax/activation/activation/1.1.1/activation-1.1.1.jar

      - name: Compile Java sources
        run: |
          cd WEB-INF/classes
          javac -cp "../../lib/servlet-api.jar:../../lib/mysql-connector-j-8.3.0.jar:../../lib/javax.mail-1.6.2.jar:../../lib/activation-1.1.1.jar:." \
            com/oceanview/util/*.java \
            com/oceanview/model/*.java \
            com/oceanview/dto/*.java \
            com/oceanview/dao/*.java \
            com/oceanview/service/*.java \
            com/oceanview/controller/*.java

      - name: Verify build
        run: |
          echo "✅ Build successful!"
          echo "Compiled classes:"
          find WEB-INF/classes -name "*.class" | wc -l
